<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Warriors</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    cursor:pointer;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

#stage{
    position:relative;
    width:min(100vw,125vh);
    aspect-ratio:1000/800;
}

canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    display:block;
}

#glow{
    pointer-events:none;
}
</style>
</head>

<body>

<div id="stage">
    <canvas id="main" width="1000" height="800"></canvas>
    <canvas id="glow" width="1000" height="800"></canvas>
</div>

<script>

document.body.onclick = () =>
    location.href = "https://research.doomsdayexplorer.online";

const canvas = document.getElementById("main");
const glowCanvas = document.getElementById("glow");

const ctx = canvas.getContext("2d");
const glow = glowCanvas.getContext("2d");

const cx = 500;
const cy = 400;

const radius = 30;
const distance = 100;

let i = 1;

function circle(x,y,r,color="yellow"){

    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);

    ctx.fillStyle=color;
    ctx.fill();

    ctx.lineWidth=5;
    ctx.strokeStyle=color;
    ctx.stroke();

}

// ----------------------------
// Energy
// ----------------------------

let energy = 0;
let opacity = 0;

let lastX,lastY;

function disturb(x,y){

    if(lastX!==undefined){

        const speed=Math.hypot(
            x-lastX,
            y-lastY
        );

        // Asymptotic charging
        energy += (1-energy) * speed * 0.002;
    }

    lastX=x;
    lastY=y;
}

window.addEventListener("mousemove",e=>{
    disturb(e.clientX,e.clientY);
});

window.addEventListener("touchmove",e=>{
    disturb(
        e.touches[0].clientX,
        e.touches[0].clientY
    );
},{passive:true});

// ----------------------------

function frame(){

    i += 2;

    const d1 = i % 30;

    ctx.filter=`blur(${20+i/12}px)`;

    ctx.fillStyle =
        (i<270 || i>1000)
            ? "rgba(95,7,112,.10)"
            : "rgba(95,7,112,.50)";

    ctx.fillRect(0,0,1000,800);

    for(const x of [-200,0,200]){

        circle(cx+x,cy+d1,radius*2);
        circle(cx+x,cy+50+distance,radius*3);

    }

    glow.clearRect(0,0,1000,800);

    glow.filter =
        "brightness(2) contrast(5) brightness(.3) brightness(3) blur(100px) contrast(5)";

    glow.drawImage(canvas,0,0);

    // ~minutes to fade
    energy *= 0.99994;

    opacity += (energy-opacity) * 0.04;

    // Never fully replace the base image
    glowCanvas.style.opacity = opacity * 0.8;

    requestAnimationFrame(frame);

}

frame();

</script>

</body>
</html>
